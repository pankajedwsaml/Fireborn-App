<!DOCTYPE html>
<html>
<head>

    <title>Fireborn Motivation</title>

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <style>

        * {
            box-sizing: border-box;
        }



        body {

            margin: 0;
            padding: 12px;

            font-family: Arial;

            display: flex;
            justify-content: center;
            align-items: center;

            min-height: 100vh;

            background:
            linear-gradient(
            135deg,
            #1e3a8a,
            #3b82f6,
            #60a5fa);

        }



        .container {

            width: 100%;
            max-width: 420px;

            background:
            rgba(255,255,255,0.18);

            backdrop-filter: blur(18px);

            border:
            1px solid rgba(255,255,255,0.2);

            border-radius: 25px;

            padding: 20px;

            text-align: center;

            box-shadow:
            0px 12px 30px rgba(0,0,0,0.25);

        }



        h1 {

            color: white;

            font-size: 24px;

            margin-bottom: 20px;

        }



        button {

            border: none;

            cursor: pointer;

            font-weight: bold;

        }



        .filter-btn {

            background:
            linear-gradient(
            135deg,
            #f59e0b,
            #ea580c);

            color: white;

            padding: 10px 14px;

            border-radius: 12px;

            margin: 4px;

            font-size: 14px;

        }



        .main-btn {

            background:
            linear-gradient(
            135deg,
            #2563eb,
            #1d4ed8);

            color: white;

            padding: 12px 16px;

            border-radius: 12px;

            margin: 6px;

            font-size: 15px;

        }



        #quoteBox {

            background:
            rgba(255,255,255,0.95);

            border-radius: 18px;

            padding: 18px;

            margin-top: 18px;

        }



        #selectedCategory {

            color: #ea580c;

            font-weight: bold;

            font-size: 16px;

        }



        #quoteText {

            color: #1e293b;

            font-size: 18px;

            line-height: 1.5;

        }



        input {

            width: 100%;

            padding: 14px;

            margin-top: 15px;

            border-radius: 12px;

            border: none;

            font-size: 15px;

        }



        .quote-item {

            background: white;

            margin-top: 12px;

            padding: 14px;

            border-radius: 12px;

            text-align: left;

            font-size: 15px;

        }



        .delete-btn {

            margin-top: 10px;

            background: crimson;

            color: white;

            padding: 8px 12px;

            border-radius: 8px;

        }



        @media (max-width: 480px) {

            h1 {
                font-size: 22px;
            }

            .filter-btn {
                font-size: 13px;
                padding: 9px 11px;
            }

            .main-btn {
                font-size: 14px;
            }

            #quoteText {
                font-size: 16px;
            }

        }

    </style>

</head>

<body>


<div class="container">

    <h1>🔥 Fireborn Motivation</h1>


    <button class="filter-btn"
    onclick="setCategory('Study')">
    Study
    </button>


    <button class="filter-btn"
    onclick="setCategory('Gym')">
    Gym
    </button>


    <button class="filter-btn"
    onclick="setCategory('Life')">
    Life
    </button>


    <button class="filter-btn"
    onclick="setCategory('Fireborn')">
    Fireborn
    </button>



    <div id="quoteBox">

        <p id="selectedCategory">
            📂 Study
        </p>

        <p id="quoteText">
            Click New Quote
        </p>

    </div>



    <button class="main-btn"
    onclick="getQuote()">
    New Quote
    </button>


    <button class="main-btn"
    onclick="showAll()">
    Show All
    </button>



    <input
    id="newQuote"
    placeholder="Write your quote here...">



    <button class="main-btn"
    onclick="addQuote()">

        Save Quote

    </button>



    <div id="allQuotes"></div>


</div>




<script>


let currentCategory = "Study";



function setCategory(category) {

    currentCategory = category;


    document.getElementById(
    "selectedCategory"
    ).innerText =

    "📂 " + category;

}




function getQuote() {

    fetch(
    '/random_quote/' +
    currentCategory
    )

    .then(res => res.json())

    .then(data => {

        document.getElementById(
        "quoteText"
        ).innerText =

        data.quote;

    });

}




function showAll() {

    fetch(
    '/all_quotes/' +
    currentCategory
    )

    .then(res => res.json())

    .then(data => {

        let box =
        document.getElementById(
        "allQuotes"
        );


        box.innerHTML = "";


        data.forEach(item => {

            let parts =
            item.split("|");


            let quote =
            parts[1];



            let div =
            document.createElement("div");


            div.className =
            "quote-item";


            div.innerHTML =

            quote +

            "<br>" +

            "<button class='delete-btn' onclick=\"deleteQuote('" +

            quote +

            "')\">Delete</button>";



            box.appendChild(div);

        });

    });

}




function addQuote() {

    let quote =

    document.getElementById(
    "newQuote"
    ).value;



    fetch('/add_quote', {

        method: 'POST',

        headers: {
            'Content-Type': 'application/json'
        },

        body: JSON.stringify({

            category:
            currentCategory,

            quote: quote

        })

    })

    .then(() => {

        alert("Saved!");

        document.getElementById(
        "newQuote"
        ).value = "";

    });

}




function deleteQuote(quote) {

    fetch('/delete_quote', {

        method: 'POST',

        headers: {
            'Content-Type': 'application/json'
        },

        body: JSON.stringify({

            category:
            currentCategory,

            quote: quote

        })

    })

    .then(() => {

        showAll();

    });

}



</script>


</body>
</html>
