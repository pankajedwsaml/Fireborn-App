<!DOCTYPE html>
<html>
<head>

    <title>Fireborn Motivation</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 14px;

            font-family: Arial;

            display: flex;
            justify-content: center;
            align-items: center;

            min-height: 100vh;

            background: linear-gradient(
                135deg,
                #1e3a8a,
                #3b82f6,
                #60a5fa
            );
        }

        .container {
            width: 100%;
            max-width: 440px;

            background: rgba(255,255,255,0.18);

            backdrop-filter: blur(18px);

            border-radius: 28px;

            padding: 24px;

            text-align: center;

            box-shadow: 0px 12px 30px rgba(0,0,0,0.25);
        }

        /* HEADER + VERSION */
        .header {
            text-align: center;
            margin-bottom: 16px;
        }

        .version-badge {
            display: inline-block;

            background: rgba(0,0,0,0.35);
            color: white;

            padding: 6px 14px;

            border-radius: 20px;

            font-size: 13px;

            font-weight: bold;

            letter-spacing: 2px;

            margin-bottom: 8px;

            backdrop-filter: blur(10px);

            box-shadow: 0px 5px 15px rgba(0,0,0,0.2);
        }

        h1 {
            margin: 0;
            color: white;

            font-size: 28px;
        }

        /* BUTTONS */
        button {
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: 0.15s ease;
        }

        button:active {
            transform: scale(0.96);
        }

        .filter-btn {
            background: linear-gradient(135deg, #f59e0b, #ea580c);
            color: white;

            padding: 12px 14px;

            border-radius: 14px;

            margin: 5px;

            font-size: 15px;
        }

        .main-btn {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: white;

            padding: 14px 18px;

            border-radius: 14px;

            margin: 8px;

            font-size: 16px;
        }

        /* QUOTE BOX */
        #quoteBox {
            background: rgba(255,255,255,0.95);

            border-radius: 20px;

            padding: 22px;

            margin-top: 18px;

            min-height: 100px;
        }

        #selectedCategory {
            color: #ea580c;
            font-weight: bold;
            font-size: 18px;
        }

        #quoteText {
            color: #1e293b;

            font-size: 22px;

            line-height: 1.5;
        }

        input {
            width: 100%;

            padding: 16px;

            margin-top: 16px;

            border-radius: 14px;

            border: none;

            font-size: 16px;
        }

        .quote-item {
            background: white;

            margin-top: 12px;

            padding: 16px;

            border-radius: 14px;

            text-align: left;

            font-size: 16px;
        }

        .delete-btn {
            margin-top: 10px;

            background: crimson;
            color: white;

            padding: 10px 14px;

            border-radius: 10px;

            font-size: 14px;
        }

    </style>

</head>

<body>

<div class="container">

    <!-- HEADER -->
    <div class="header">
        <div class="version-badge">V6</div>
        <h1>🔥 Fireborn Motivation</h1>
    </div>

    <!-- CATEGORY BUTTONS -->
    <button class="filter-btn" onclick="setCategory('Study')">Study</button>
    <button class="filter-btn" onclick="setCategory('Gym')">Gym</button>
    <button class="filter-btn" onclick="setCategory('Life')">Life</button>
    <button class="filter-btn" onclick="setCategory('Fireborn')">Fireborn</button>

    <!-- QUOTE BOX -->
    <div id="quoteBox">

        <p id="selectedCategory">📂 Study</p>

        <p id="quoteText">Click New Quote</p>

    </div>

    <!-- ACTION BUTTONS -->
    <button class="main-btn" onclick="getQuote()">New Quote</button>

    <button class="main-btn" onclick="showAll()">Show All</button>

    <!-- INPUT -->
    <input id="newQuote" placeholder="Write your quote here...">

    <button class="main-btn" onclick="addQuote()">Save Quote</button>

    <!-- ALL QUOTES -->
    <div id="allQuotes"></div>

</div>

<script>

let currentCategory = "Study";

function setCategory(category) {
    currentCategory = category;

    document.getElementById("selectedCategory").innerText =
        "📂 " + category;
}

function getQuote() {
    fetch('/random_quote/' + currentCategory)
    .then(res => res.json())
    .then(data => {
        document.getElementById("quoteText").innerText = data.quote;
    });
}

function showAll() {
    fetch('/all_quotes/' + currentCategory)
    .then(res => res.json())
    .then(data => {

        let box = document.getElementById("allQuotes");
        box.innerHTML = "";

        data.forEach(item => {

            let parts = item.split("|");
            let quote = parts[1];

            let div = document.createElement("div");
            div.className = "quote-item";

            div.innerHTML =
                quote +
                "<br>" +
                "<button class='delete-btn' onclick=\"deleteQuote('" +
                quote +
                "')\">Delete</button>";

            box.appendChild(div);
        });

    });
}

function addQuote() {

    let quote = document.getElementById("newQuote").value;

    fetch('/add_quote', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({
            category: currentCategory,
            quote: quote
        })
    })
    .then(() => {
        alert("Saved!");
        document.getElementById("newQuote").value = "";
    });
}

function deleteQuote(quote) {

    fetch('/delete_quote', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({
            category: currentCategory,
            quote: quote
        })
    })
    .then(() => {
        showAll();
    });
}

</script>

</body>
</html>
